<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josh's Kitchen — Namibian Recipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#F5E6C8;
  --sand-dark:#E8D0A0;
  --dune:#C4956A;
  --dune-dark:#9B6B42;
  --earth:#5C3D1E;
  --earth-deep:#3A2210;
  --fire:#D45A2A;
  --fire-light:#E8896A;
  --fire-pale:#FBF0EB;
  --savanna:#6B7C3A;
  --savanna-pale:#EEF2E3;
  --ink:#2C1A0E;
  --ink-mid:#7A5535;
  --ink-faint:#B8956A;
  --bg:#FCF7EF;
  --card:#FFFDF9;
  --border:rgba(196,149,106,0.22);
  --border-mid:rgba(196,149,106,0.45);
}

/* ─── BASE ──────────────────────────────────────────── */
body{
  background:var(--earth-deep);
  font-family:'Outfit',sans-serif;
  color:var(--ink);
  min-height:100vh;
}

/* ─── BACKGROUND MOSAIC ─────────────────────────────── */
#bg-mosaic{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:0;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-auto-rows:120px;
  overflow:hidden;
  opacity:0.15;
  pointer-events:none;
}
#bg-mosaic img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(1.1);
}

/* ─── PAGE WRAPPER ──────────────────────────────────── */
.page{position:relative;z-index:1;}

/* ─── TOP BAR ───────────────────────────────────────── */
.topbar{
  background:rgba(30,16,8,0.93);
  backdrop-filter:blur(12px);
  padding:0.65rem 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(196,149,106,0.15);
}
.topbar-tag{
  font-size:10px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--sand-dark);
  font-weight:500;
}
#recipe-counter{color:var(--fire-light);}

/* ─── HERO ──────────────────────────────────────────── */
.hero{
  position:relative;
  overflow:hidden;
  padding:3rem 2rem 2.5rem;
  text-align:center;
}
.hero-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 40%;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(30,16,8,0.78) 0%,
    rgba(58,34,16,0.85) 60%,
    rgba(30,16,8,0.95) 100%);
}
.hero-content{position:relative;}
.hero-sub{
  font-size:11px;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--fire-light);
  font-weight:500;
  margin-bottom:0.5rem;
}
.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:50px;
  font-weight:700;
  line-height:1;
  color:var(--sand);
  margin-bottom:0.35rem;
}
.hero h1 span{color:var(--fire-light);font-style:italic;}
.hero-desc{
  font-size:13px;
  color:rgba(245,230,200,0.6);
  font-weight:300;
  letter-spacing:0.04em;
}
.hero-divider{
  width:50px;height:2px;
  background:var(--fire);
  margin:1rem auto 0;
  border-radius:2px;
}

/* ─── SEARCH ────────────────────────────────────────── */
.search-section{
  padding:1.5rem 2rem 0.5rem;
  max-width:680px;
  margin:0 auto;
}
.search-row{display:flex;gap:10px;}
.search-box{
  flex:1;
  display:flex;
  align-items:center;
  background:rgba(252,247,239,0.95);
  border:1.5px solid var(--border-mid);
  border-radius:8px;
  padding:0 1rem;
  transition:border-color 0.2s,box-shadow 0.2s;
  backdrop-filter:blur(8px);
}
.search-box:focus-within{
  border-color:var(--fire);
  box-shadow:0 0 0 3px var(--fire-pale);
}
.search-box input{
  flex:1;border:none;outline:none;
  font-family:'Outfit',sans-serif;
  font-size:14px;color:var(--ink);
  background:transparent;
  padding:13px 0;
}
.search-box input::placeholder{color:var(--ink-faint);}
.btn-go{
  background:var(--fire);color:#fff;
  border:none;border-radius:8px;
  padding:13px 22px;
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;
  transition:background 0.18s,transform 0.1s;
  white-space:nowrap;
}
.btn-go:hover{background:var(--dune-dark);}
.btn-go:active{transform:scale(0.97);}

/* ─── FILTER PILLS ──────────────────────────────────── */
.filter-row{
  display:flex;gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  padding:0.75rem 0 0;
}
.filter-row::-webkit-scrollbar{display:none;}
.fpill{
  flex-shrink:0;
  background:rgba(252,247,239,0.12);
  border:1px solid rgba(196,149,106,0.35);
  border-radius:6px;
  padding:6px 14px;
  font-size:12px;font-weight:500;
  color:var(--sand-dark);
  cursor:pointer;
  transition:all 0.18s;
  font-family:'Outfit',sans-serif;
  backdrop-filter:blur(4px);
}
.fpill:hover,.fpill.active{
  background:var(--fire);
  color:#fff;
  border-color:var(--fire);
}
.fpill.fav-pill.active{
  background:#e74c6a;
  border-color:#e74c6a;
}

/* ─── RESULTS INFO ──────────────────────────────────── */
.results-info{
  padding:0.6rem 2rem;
  max-width:680px;
  margin:0 auto;
  font-size:12px;
  color:rgba(245,214,160,0.55);
}
.results-info b{color:var(--sand-dark);font-weight:600;}

/* ─── RECIPE GRID ───────────────────────────────────── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1.1rem;
  padding:0.25rem 2rem 3rem;
  max-width:680px;
  margin:0 auto;
}
.card{
  background:var(--card);
  border-radius:12px;
  border:1.5px solid var(--border);
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  animation:fadeUp 0.4s ease both;
  position:relative;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 36px rgba(0,0,0,0.35);
}
.card-img-wrap{
  height:155px;overflow:hidden;
  background:var(--sand);position:relative;
}
.card-img-wrap img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:transform 0.4s ease;
}
.card:hover .card-img-wrap img{transform:scale(1.07);}
.card-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(30,16,8,0.45));
}

/* ─── FAVOURITE BUTTON (CARD) ───────────────────────── */
.fav-btn{
  position:absolute;top:9px;right:9px;z-index:5;
  width:30px;height:30px;border-radius:50%;
  background:rgba(30,16,8,0.55);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:14px;
  transition:transform 0.2s,background 0.2s;
}
.fav-btn:hover{transform:scale(1.15);background:rgba(231,76,106,0.7);}
.fav-btn.active{background:rgba(231,76,106,0.9);border-color:rgba(231,76,106,0.5);}

/* ─── CARD BODY ─────────────────────────────────────── */
.card-body{padding:0.8rem 0.95rem 0.95rem;}
.card-tag{
  font-size:10px;letter-spacing:0.13em;
  text-transform:uppercase;
  color:var(--fire);font-weight:600;margin-bottom:3px;
}
.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:600;
  line-height:1.25;color:var(--ink);margin-bottom:5px;
}
.card-meta{display:flex;gap:10px;margin-top:4px;}
.card-region,.card-time{
  font-size:11px;
  display:flex;align-items:center;gap:3px;
}
.card-region{color:var(--ink-faint);}
.card-time{color:var(--savanna);}
.diff-badge{
  display:inline-block;
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:4px;margin-top:6px;
}
.diff-easy{background:#eef2e3;color:#6B7C3A;}
.diff-medium{background:#FBF0EB;color:#C4622D;}
.diff-hard{background:#fce8e8;color:#b93535;}

/* ─── EMPTY STATE ───────────────────────────────────── */
.empty-state{
  text-align:center;padding:3rem 2rem;
  max-width:360px;margin:0 auto;
}
.empty-state h3{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;color:var(--sand);margin-bottom:0.4rem;
}
.empty-state p{
  font-size:13px;color:rgba(245,214,160,0.5);font-weight:300;
}

/* ─── MODAL ─────────────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(20,10,4,0.82);
  z-index:200;
  align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem;overflow-y:auto;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--bg);border-radius:14px;
  max-width:660px;width:100%;
  position:relative;overflow:hidden;margin:auto;
}
.modal-hero-wrap{position:relative;}
.modal-hero-img{width:100%;height:250px;object-fit:cover;display:block;}
.modal-hero-overlay{
  position:absolute;bottom:0;left:0;right:0;height:150px;
  background:linear-gradient(to top,rgba(30,16,8,0.92),transparent);
}
.modal-header-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.25rem 1.5rem;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.4rem;}
.mbadge{
  font-size:10px;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;padding:4px 11px;border-radius:4px;
}
.mbadge-fire{background:var(--fire);color:#fff;}
.mbadge-earth{
  background:rgba(245,230,200,0.15);color:var(--sand);
  border:1px solid rgba(245,230,200,0.25);
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:700;
  color:#fff;line-height:1.1;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.modal-fav-btn{
  flex-shrink:0;width:38px;height:38px;border-radius:50%;
  background:rgba(30,16,8,0.5);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:18px;
  transition:all 0.2s;margin-bottom:4px;
}
.modal-fav-btn:hover{background:rgba(231,76,106,0.7);transform:scale(1.1);}
.modal-fav-btn.active{background:#e74c6a;border-color:#e74c6a;}
.modal-close{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;width:32px;height:32px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;z-index:10;
  transition:background 0.15s;
}
.modal-close:hover{background:rgba(0,0,0,0.65);}
.modal-body{padding:1.5rem;}
.modal-desc{
  font-size:13.5px;color:var(--ink-mid);
  margin-bottom:1.25rem;font-weight:300;line-height:1.6;
}
.modal-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:1.5rem;
}
.stat-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:8px;padding:0.7rem;text-align:center;
}
.stat-val{
  font-size:17px;font-weight:600;color:var(--fire);
  font-family:'Cormorant Garamond',serif;
}
.stat-lbl{
  font-size:10px;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--ink-faint);margin-top:2px;font-weight:500;
}
.section-head{
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--fire);font-weight:600;
  padding-bottom:0.5rem;border-bottom:1px solid var(--border);
  margin-bottom:0.9rem;display:flex;align-items:center;gap:6px;
}
.ing-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:7px;margin-bottom:1.5rem;
}
.ing-item{display:flex;align-items:flex-start;gap:7px;font-size:13px;line-height:1.3;}
.ing-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--fire);margin-top:4px;flex-shrink:0;
}
.ing-qty{color:var(--ink-faint);min-width:56px;font-size:12px;}
.ing-name{color:var(--ink-mid);}
.steps-list{margin-bottom:1rem;}
.step-item{
  display:flex;gap:12px;margin-bottom:1rem;
  font-size:13.5px;line-height:1.65;color:var(--ink-mid);
}
.step-num{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:var(--earth);color:var(--sand);
  font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  margin-top:2px;
}
.tip-box{
  background:var(--savanna-pale);
  border-left:3px solid var(--savanna);
  border-radius:0 8px 8px 0;
  padding:0.75rem 1rem;
  font-size:12.5px;line-height:1.6;color:var(--earth);
}
.tip-label{
  font-size:10px;text-transform:uppercase;
  letter-spacing:0.12em;font-weight:600;
  color:var(--savanna);margin-bottom:3px;
}

/* ─── RESPONSIVE ────────────────────────────────────── */
@media(max-width:500px){
  .hero h1{font-size:36px;}
  .grid{grid-template-columns:1fr 1fr;gap:0.75rem;padding:0.25rem 1rem 3rem;}
  .search-section{padding:1rem 1rem 0.5rem;}
  .topbar{padding:0.6rem 1rem;}
}
</style>
</head>
<body>

<!-- ─── BACKGROUND FOOD MOSAIC ──────────────────────── -->
<div id="bg-mosaic"></div>

<!-- ─── PAGE ─────────────────────────────────────────── -->
<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-tag">🇳🇦 Namibia &nbsp;·&nbsp; Authentic Flavours</div>
    <div class="topbar-tag" id="recipe-counter"></div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <!-- 🖼️ Change this src to any hero image URL you like -->
    <img class="hero-img"
      src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=1200&auto=format&fit=crop&q=80"
      alt="Hero food background">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-sub">Welcome to</div>
      <!-- ✏️ Change the kitchen name here -->
      <h1>Josh's <span>Kitchen</span></h1>
      <div class="hero-desc">Namibian recipes — from the coast to the Kalahari</div>
      <div class="hero-divider"></div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-row">
      <div class="search-box">
        <input id="q" type="text" placeholder="Search recipes, ingredients…" autocomplete="off">
      </div>
      <button class="btn-go" onclick="doSearch()">Search</button>
    </div>
    <div class="filter-row" id="filters"></div>
  </div>

  <div class="results-info" id="rinfo"></div>
  <div id="main"></div>
</div>

<!-- ─── RECIPE MODAL ──────────────────────────────────── -->
<div class="modal-bg" id="modal" onclick="maybeClose(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// BACKGROUND MOSAIC IMAGES
// Add or change URLs here to update background food photos
// ─────────────────────────────────────────────────────────
const BG_IMAGES = [
  'https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1540189549336-e6e99ef71240?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1476224203421-74177f19a981?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1547592180-85f173990554?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1565299624946-b28f40a04680?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300&h=120&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1574484284002-952d92456975?w=300&h=120&auto=format&fit=crop',
];

// ─────────────────────────────────────────────────────────
// RECIPES — Add, edit, or remove recipes here.
// Each recipe needs:
//   id         : unique number
//   name       : recipe name (string)
//   img        : URL to a photo (Unsplash, your own, etc.)
//   category   : shows in filter pills
//   region     : Namibian region
//   time       : cook time string
//   servings   : number of servings string
//   difficulty : "Easy" | "Medium" | "Hard"
//   desc       : short description
//   ingredients: array of { qty, name }
//   steps      : array of instruction strings
//   tip        : chef's tip string
// ─────────────────────────────────────────────────────────
const RECIPES = [
  {
    id: 1,
    name: "Kapana",
    img: "images/kapana.jpg",
    category: "Street Food",
    region: "Windhoek",
    time: "25 min",
    servings: "4",
    difficulty: "Easy",
    desc: "Sizzling grilled beef from Windhoek's Katutura markets — Namibia's most beloved street food.",
    ingredients: [
      { qty: "1 kg",     name: "beef chuck, cubed" },
      { qty: "2 tbsp",   name: "vegetable oil" },
      { qty: "1 tsp",    name: "salt" },
      { qty: "1 tsp",    name: "black pepper" },
      { qty: "1 tsp",    name: "chilli flakes" },
      { qty: "2 tsp",    name: "garlic powder" },
      { qty: "1",        name: "lemon, halved" },
      { qty: "4 slices", name: "white bread" },
      { qty: "2",        name: "tomatoes, diced" },
      { qty: "1",        name: "onion, finely chopped" },
    ],
    steps: [
      "Cube beef into 3–4 cm pieces. Pat completely dry — key for a good sear.",
      "Mix salt, pepper, chilli flakes, and garlic powder. Toss beef generously in the spice mix.",
      "Heat a cast-iron pan over very high heat until smoking. Add oil.",
      "Grill beef 3–4 minutes per side until charred and cooked through.",
      "Squeeze lemon over hot meat immediately off the heat.",
      "Mix diced tomatoes and onion as a fresh relish. Season with salt.",
      "Serve Kapana on white bread with the tomato-onion relish piled on top.",
    ],
    tip: "At Katutura market they fan the coals vigorously — extreme heat is the secret to authentic smoky Kapana."
  },
  {
    id: 2,
    name: "Oshifima",
    img: "images/oshifima.jpg",
    category: "Staple",
    region: "Oshiwambo",
    time: "20 min",
    servings: "6",
    difficulty: "Easy",
    desc: "Stiff maize porridge — the cornerstone of Oshiwambo cuisine, eaten with hands alongside stew or spinach.",
    ingredients: [
      { qty: "2 cups", name: "white maize meal" },
      { qty: "4 cups", name: "water" },
      { qty: "1 tsp",  name: "salt" },
      { qty: "½ cup",  name: "extra maize meal for thickening" },
    ],
    steps: [
      "Bring 4 cups of water to a rolling boil. Add salt.",
      "Slowly pour in 2 cups of maize meal while stirring constantly to avoid lumps.",
      "Reduce heat to medium-low. Cook 10 minutes, stirring frequently.",
      "When porridge pulls away from the sides, add extra ½ cup gradually.",
      "Stir vigorously until very stiff and smooth — should hold its shape.",
      "Wet your hands and shape into a smooth mound.",
      "Serve with Ombidi spinach, chicken stew, or fermented milk.",
    ],
    tip: "Traditional Oshifima is much stiffer than ordinary porridge. If it flows, add more maize meal and cook longer."
  },
  {
    id: 3,
    name: "Potjiekos",
    img: "images/potjiekos.jpg",
    category: "Traditional Stew",
    region: "Southern Namibia",
    time: "3 hrs",
    servings: "6",
    difficulty: "Medium",
    desc: "Slow-cooked cast-iron pot stew layered with game or lamb, root vegetables, and aromatic spices.",
    ingredients: [
      { qty: "1.2 kg", name: "lamb shoulder or game meat" },
      { qty: "3 tbsp", name: "vegetable oil" },
      { qty: "2",      name: "onions, roughly chopped" },
      { qty: "4",      name: "garlic cloves, crushed" },
      { qty: "3",      name: "carrots, sliced" },
      { qty: "3",      name: "potatoes, quartered" },
      { qty: "2",      name: "sweet potatoes, cubed" },
      { qty: "1 cup",  name: "dry red wine" },

const bgEl = document.getElementById('bg-mosaic');
for (let i = 0; i < 45; i++) {
  const img = document.createElement('img');
  img.src = BG_IMAGES[i % BG_IMAGES.length];
  img.alt = '';
  img.loading = 'lazy';
  bgEl.appendChild(img);
}

// Recipe counter
document.getElementById('recipe-counter').textContent = RECIPES.length + " Recipes";

// Build filter pills
const filtersEl = document.getElementById('filters');
CATEGORIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'fpill' + (c === "All" ? " active" : "") + (c === "★ Favourites" ? " fav-pill" : "");
  b.textContent = c;
  b.onclick = () => {
    document.querySelectorAll('.fpill').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = c;
    render();
  };
  filtersEl.appendChild(b);
});

// Search
const qEl = document.getElementById('q');
qEl.addEventListener('input', () => { searchTerm = qEl.value.toLowerCase(); render(); });
qEl.addEventListener('keydown', e => e.key === 'Enter' && render());
function doSearch() { searchTerm = qEl.value.toLowerCase(); render(); }

// Toggle favourite
function toggleFav(e, id) {
  e.stopPropagation();
  favourites.has(id) ? favourites.delete(id) : favourites.add(id);
  render();
  const btn = document.querySelector('.modal-fav-btn');
  if (btn) {
    btn.classList.toggle('active', favourites.has(id));
    btn.title = favourites.has(id) ? 'Remove from favourites' : 'Save to favourites';
    btn.textContent = favourites.has(id) ? '♥' : '♡';
  }
}

// Filter
function getFiltered() {
  return RECIPES.filter(r => {
    if (activeFilter === "★ Favourites") return favourites.has(r.id);
    const matchCat = activeFilter === "All" || r.category === activeFilter;
    const matchSearch = !searchTerm ||
      r.name.toLowerCase().includes(searchTerm) ||
      r.desc.toLowerCase().includes(searchTerm) ||
      r.category.toLowerCase().includes(searchTerm) ||
      r.region.toLowerCase().includes(searchTerm) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(searchTerm));
    return matchCat && matchSearch;
  });
}

function diffClass(d) {
  return d === "Easy" ? "diff-easy" : d === "Medium" ? "diff-medium" : "diff-hard";
}

// Render cards
function render() {
  const filtered = getFiltered();
  const rinfo = document.getElementById('rinfo');
  const main = document.getElementById('main');

  if (!filtered.length) {
    rinfo.innerHTML = '';
    main.innerHTML = activeFilter === "★ Favourites"
      ? '<div class="empty-state"><h3>No favourites yet</h3><p>Tap the ♡ on any recipe card to save it here.</p></div>'
      : '<div class="empty-state"><h3>Nothing found</h3><p>Try a different search — ingredient names work too!</p></div>';
    return;
  }

  rinfo.innerHTML = 'Showing <b>' + filtered.length + '</b> of ' + RECIPES.length + ' Namibian recipes';
  const grid = document.createElement('div');
  grid.className = 'grid';

  filtered.forEach((r, i) => {
    const isFav = favourites.has(r.id);
    const c = document.createElement('div');
    c.className = 'card';
    c.style.animationDelay = (i * 0.05) + 's';
    c.innerHTML =
      '<div class="card-img-wrap"><img src="' + r.img + '" alt="' + r.name + '" loading="lazy"><div class="card-img-overlay"></div></div>' +
      '<button class="fav-btn' + (isFav ? ' active' : '') + '" title="' + (isFav ? 'Remove' : 'Save') + '" onclick="toggleFav(event,' + r.id + ')">' + (isFav ? '♥' : '♡') + '</button>' +
      '<div class="card-body">' +
        '<div class="card-tag">' + r.category + '</div>' +
        '<div class="card-title">' + r.name + '</div>' +
        '<div class="card-meta">' +
          '<div class="card-region">📍 ' + r.region + '</div>' +
          '<div class="card-time">⏱ ' + r.time + '</div>' +
        '</div>' +
        '<span class="diff-badge ' + diffClass(r.difficulty) + '">' + r.difficulty + '</span>' +
      '</div>';
    c.querySelector('.card-img-wrap').onclick = () => openRecipe(r.id);
    c.querySelector('.card-body').onclick = () => openRecipe(r.id);
    grid.appendChild(c);
  });

  main.innerHTML = '';
  main.appendChild(grid);
}

// Open recipe modal
function openRecipe(id) {
  const r = RECIPES.find(x => x.id === id);
  const isFav = favourites.has(r.id);
  const modal = document.getElementById('modal');
  const inner = document.getElementById('modal-inner');

  inner.innerHTML =
    '<div class="modal-hero-wrap">' +
      '<img class="modal-hero-img" src="' + r.img + '" alt="' + r.name + '">' +
      '<div class="modal-hero-overlay"></div>' +
      '<button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>' +
      '<div class="modal-header-info">' +
        '<div style="flex:1">' +
          '<div class="modal-badges">' +
            '<span class="mbadge mbadge-fire">' + r.category + '</span>' +
            '<span class="mbadge mbadge-earth">' + r.region + '</span>' +
          '</div>' +
          '<div class="modal-title">' + r.name + '</div>' +
        '</div>' +
        '<button class="modal-fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFav(event,' + r.id + ')">' + (isFav ? '♥' : '♡') + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="modal-body">' +
      '<p class="modal-desc">' + r.desc + '</p>' +
      '<div class="modal-stats">' +
        '<div class="stat-card"><div class="stat-val">' + r.time + '</div><div class="stat-lbl">Total Time</div></div>' +
        '<div class="stat-card"><div class="stat-val">' + r.servings + '</div><div class="stat-lbl">Servings</div></div>' +
        '<div class="stat-card"><div class="stat-val">' + r.difficulty + '</div><div class="stat-lbl">Difficulty</div></div>' +
      '</div>' +
      '<div class="section-head">🧺 Ingredients</div>' +
      '<div class="ing-grid">' + r.ingredients.map(i =>
        '<div class="ing-item"><div class="ing-dot"></div><span class="ing-qty">' + i.qty + '</span><span class="ing-name">' + i.name + '</span></div>'
      ).join('') + '</div>' +
      '<div class="section-head">📋 Instructions</div>' +
      '<div class="steps-list">' + r.steps.map((s, i) =>
        '<div class="step-item"><div class="step-num">' + (i + 1) + '</div><div>' + s + '</div></div>'
      ).join('') + '</div>' +
      '<div class="tip-box"><div class="tip-label">🌿 Chef\'s Tip</div>' + r.tip + '</div>' +
    '</div>';

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function maybeClose(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
document.addEventListener('keydown', e => e.key === 'Escape' && closeModal());

// Initial render
render();
</script>
</body>
</html>
